<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI automation with connected workflow nodes</title>
  <desc id="desc">A dark operations control room with API cards, message channels, and automation routing paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#130b18"/>
      <stop offset=".48" stop-color="#071322"/>
      <stop offset="1" stop-color="#0f2b38"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#ff6b00"/>
      <stop offset=".5" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#00d1ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0v44" fill="none" stroke="#ffffff" stroke-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
