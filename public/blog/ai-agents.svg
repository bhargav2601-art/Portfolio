<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI agent orchestration visual</title>
  <desc id="desc">A dark AI engineering dashboard with glowing agent nodes, routing lines, validation panels, and neural traces.</desc>
  <defs>
    <radialGradient id="bg" cx="24%" cy="22%" r="78%">
      <stop offset="0" stop-color="#123f58"/>
      <stop offset=".48" stop-color="#091629"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="cyanOrange" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#00d1ff"/>
      <stop offset=".52" stop-color="#6cf3ff"/>
      <stop offset="1" stop-color="#ff6b00"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#ffffff" stroke-opacity=".055"/>
    </pattern>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect width="1200" height="760" fill="url(#grid)"/>
  <path d="M80 610C264 390 356 548 516 326S806 122 1120 250" fill="none" stroke="#00d1ff" stroke-opacity=".18" stroke-width="2"/>
  <path d="M112 196C312 306 474 172 640 360s312 204 444 64" fill="none" stroke="#ff6b00" stroke-opacity=".16" stroke-width="2"/>
  <g filter="url(#glow)">
    <circle cx="604" cy="366" r="116" fill="#06111f" stroke="url(#cyanOrange)" stroke-width="3"/>
    <circle cx="604" cy="366" r="64" fill="#0d2035" stroke="#8ff5ff" stroke-opacity=".55"/>
    <path d="M560 365h88M604 321v88M574 333l60 66M634 333l-60 66" stroke="#8ff5ff" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g fill="#071323" stroke="#ffffff" stroke-opacity=".16" stroke-width="2">
    <rect x="120" y="134" width="230" height="142" rx="22"/>
    <rect x="850" y="112" width="226" height="142" rx="22"/>
    <rect x="150" y="486" width="252" height="148" rx="22"/>
    <rect x="812" y="488" width="252" height="148" rx="22"/>
  </g>
  <g stroke="url(#cyanOrange)" stroke-width="5" stroke-linecap="round" filter="url(#glow)">
    <path d="M350 205c82 0 116 46 156 104"/>
    <path d="M850 182c-78 16-118 62-154 122"/>
    <path d="M402 556c76-16 108-78 140-132"/>
    <path d="M812 562c-78-20-112-78-148-138"/>
  </g>
  <g fill="#00d1ff" filter="url(#glow)">
    <circle cx="235" cy="205" r="18"/>
    <circle cx="963" cy="183" r="18"/>
    <circle cx="278" cy="560" r="18"/>
    <circle cx="938" cy="560" r="18"/>
  </g>
  <g fill="#dffbff" opacity=".9">
    <rect x="168" y="178" width="132" height="8" rx="4"/>
    <rect x="168" y="208" width="96" height="8" rx="4"/>
    <rect x="898" y="156" width="128" height="8" rx="4"/>
    <rect x="898" y="188" width="92" height="8" rx="4"/>
    <rect x="202" y="532" width="146" height="8" rx="4"/>
    <rect x="202" y="564" width="106" height="8" rx="4"/>
    <rect x="866" y="532" width="150" height="8" rx="4"/>
    <rect x="866" y="564" width="112" height="8" rx="4"/>
  </g>
  <g opacity=".55">
    <circle cx="1004" cy="358" r="96" fill="none" stroke="#00d1ff" stroke-width="1"/>
    <circle cx="1004" cy="358" r="56" fill="none" stroke="#ff6b00" stroke-width="1"/>
    <circle cx="190" cy="378" r="82" fill="none" stroke="#00d1ff" stroke-width="1"/>
